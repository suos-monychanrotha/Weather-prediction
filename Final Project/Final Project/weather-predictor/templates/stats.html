<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Visual statistics and model insights for the Weather Predictor — class distribution and feature importance charts." />
  <title>Weather Predictor — Stats Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <style>
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }
    .chart-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
    }
    .chart-wrapper canvas {
      width: 100% !important;
      height: 100% !important;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--gray-400);
      font-size: .95rem;
    }
    @media (max-width: 700px) {
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar">
    <a href="/">🌦️ Predictor</a>
    <a href="/stats" class="active">📊 Stats</a>
  </nav>

  <div class="container">

    <header class="header">
      <div class="header-icon">📊</div>
      <h1>Stats Dashboard</h1>
      <p>Dataset distribution and model feature importance</p>
    </header>

    <div class="card">
      <div id="loading" class="loading">Loading chart data…</div>
      <div class="charts-grid" id="charts" style="display:none;">
        <div>
          <div class="card-title"><span>🌧️</span> Class Distribution</div>
          <div class="chart-wrapper">
            <canvas id="classChart"></canvas>
          </div>
        </div>
        <div>
          <div class="card-title"><span>🎯</span> Feature Importance (Random Forest)</div>
          <div class="chart-wrapper">
            <canvas id="featureChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">
      Powered by Machine Learning · Rain in Australia Dataset
    </div>
  </div>

  <script>
    const AMBER = '#f59e0b';
    const BLUE  = '#3b82f6';

    async function loadCharts() {
      try {
        const res = await fetch('/chart-data');
        const data = await res.json();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('charts').style.display = 'grid';

        // ── Class Distribution Bar Chart ──
        new Chart(document.getElementById('classChart'), {
          type: 'bar',
          data: {
            labels: data.class_distribution.labels,
            datasets: [{
              label: 'Number of Days',
              data: data.class_distribution.counts,
              backgroundColor: [AMBER, BLUE],
              borderRadius: 8,
              maxBarThickness: 80
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => `${ctx.parsed.y.toLocaleString()} days`
                }
              }
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: v => v >= 1000 ? (v / 1000) + 'k' : v
                },
                grid: { color: 'rgba(0,0,0,.05)' }
              },
              x: { grid: { display: false } }
            }
          }
        });

        // ── Feature Importance Bar Chart ──
        const sorted = data.feature_importance.labels
          .map((label, i) => ({ label, value: data.feature_importance.values[i] }))
          .sort((a, b) => b.value - a.value);

        new Chart(document.getElementById('featureChart'), {
          type: 'bar',
          data: {
            labels: sorted.map(d => d.label),
            datasets: [{
              label: 'Importance',
              data: sorted.map(d => d.value),
              backgroundColor: sorted.map((_, i) =>
                `hsl(${200 - i * 12}, 80%, ${55 + i * 2}%)`
              ),
              borderRadius: 8,
              maxBarThickness: 50
            }]
          },
          options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: ctx => `Importance: ${ctx.parsed.x.toFixed(4)}`
                }
              }
            },
            scales: {
              x: {
                beginAtZero: true,
                grid: { color: 'rgba(0,0,0,.05)' }
              },
              y: {
                grid: { display: false },
                ticks: { font: { size: 11 } }
              }
            }
          }
        });

      } catch (err) {
        document.getElementById('loading').textContent = '⚠️ Failed to load chart data.';
        console.error(err);
      }
    }

    loadCharts();
  </script>
</body>
</html>
